# ════════════════════════════════════════════════════
#   Presence Service - Configuración
# ════════════════════════════════════════════════════

# ── Nombre y puerto ──────────────────────────────────
spring.application.name=presence-service

# HTTP activo para que el healthcheck de Docker pueda
# consultar /actuator/health en el puerto 8081
server.port=8081

# ── Puerto gRPC ──────────────────────────────────────
grpc.server.port=9090

# ── Base de datos H2 en memoria ──────────────────────
# in-memory es suficiente: si el servicio se reinicia,
# los estados de presencia se resetean (comportamiento correcto).
spring.datasource.url=jdbc:h2:mem:presence;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ──────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── Actuator ─────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── Logs ─────────────────────────────────────────────
logging.level.com.groupsapp.presence=INFO
logging.level.net.devh.boot.grpc=INFO