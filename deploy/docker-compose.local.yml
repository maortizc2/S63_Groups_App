version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: groupsapp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: groupsapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: groupsapp1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - groupsapp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  presence-service:
    build:
      context: ..          # raíz del repo (S63_Groups_App/)
      dockerfile: presence-service/Dockerfile
    image: groupsapp-presence:dev
    container_name: groupsapp-presence
    restart: unless-stopped
    ports:
      - "8081:8081"   # HTTP (Actuator, health)
      - "9090:9090"   # gRPC — el monolito habla aquí
    networks:
      - groupsapp-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  monolito:
    image: groupsapp-monolito:dev
    container_name: groupsapp-monolito
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      presence-service:
        condition: service_healthy   # espera a que gRPC esté listo
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/groupsapp
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: groupsapp1234
      APP_JWT_SECRET: groupsAppSecretKey2026SuperLongAndSecureKeyForJWT
      APP_UPLOAD_DIR: /tmp/uploads
      # ── Presence service ──────────────────────────────────────────────────
      GRPC_CLIENT_PRESENCE_SERVICE_ADDRESS: static://presence-service:9090
      GRPC_CLIENT_PRESENCE_SERVICE_NEGOTIATION_TYPE: plaintext
    ports:
      - "8080:8080"
    networks:
      - groupsapp-network

volumes:
  postgres_data:

networks:
  groupsapp-network:
    driver: bridge