version: '3.8'

services:

  # ── Base de datos PostgreSQL ──────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: groupsapp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: groupsapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tu_password     # ← Cambia esto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - groupsapp-network

  # ── pgAdmin (interfaz visual para la BD) ─────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: groupsapp-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@groupsapp.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"                        # Abrir en: http://localhost:5050
    depends_on:
      - postgres
    networks:
      - groupsapp-network

volumes:
  postgres_data:

networks:
  groupsapp-network:
    driver: bridge