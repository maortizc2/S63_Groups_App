# ════════════════════════════════════════════════════
#   Perfil: AWS (despliegue en EC2)
# ════════════════════════════════════════════════════

# ── Base de datos (RDS) - valores vienen de env vars ─
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# ── Secreto JWT (viene de env var, NUNCA hardcodeado) ─
app.jwt.secret=${APP_JWT_SECRET}

# ── Almacenamiento: S3 ───────────────────────────────
app.storage.type=s3
app.s3.bucket=${APP_S3_BUCKET}

# ── Logs menos verbosos en producción ────────────────
logging.level.com.groupsapp=INFO
logging.level.org.hibernate.SQL=WARN

# ── SQS (AWS real) ───────────────────────────────────
# endpoint queda vacío para usar el endpoint regional oficial
app.sqs.endpoint=
app.sqs.region=${APP_SQS_REGION:us-east-1}
app.sqs.queue-url=${APP_SQS_QUEUE_URL}