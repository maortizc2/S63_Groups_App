# ════════════════════════════════════════════════════
#   GroupsApp - Configuración común a todos los perfiles
# ════════════════════════════════════════════════════

# ── Servidor ─────────────────────────────────────────
server.port=8080

# ── Perfil activo (override con SPRING_PROFILES_ACTIVE) ──
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ── Pool de conexiones (común a todos los perfiles) ──
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ──────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Archivos (upload) ────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# ── JWT (expiración común; el secret va por perfil) ──
app.jwt.expiration=86400000

# ── Actuator (métricas) ──────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=groupsapp-monolito

# ── Swagger / OpenAPI ────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Logs (nivel común) ───────────────────────────────
logging.level.org.springframework.security=INFO

# gRPC client — apunta al presence-service
grpc.client.presence-service.address=static://localhost:9090
grpc.client.presence-service.negotiation-type=plaintext