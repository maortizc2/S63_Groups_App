# ════════════════════════════════════════════════════
#   GroupsApp - Configuración Principal
# ════════════════════════════════════════════════════

# ── Servidor ─────────────────────────────────────────
server.port=8080

# ── PostgreSQL ────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/groupsapp
spring.datasource.username=postgres
spring.datasource.password=tu_password
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexiones
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ───────────────────────────────────
# "update"    → crea/modifica tablas sin borrar datos (usar en desarrollo)
# "create"    → borra y recrea todo al iniciar (cuidado!)
# "validate"  → solo valida, no modifica (usar en producción)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Archivos (upload) ─────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# ── Variables propias de la app ───────────────────────
# Carpeta local donde se guardan los archivos subidos
app.upload.dir=uploads/

# JWT
app.jwt.secret=groupsAppSecretKey2026SuperLongAndSecureKeyForJWT
app.jwt.expiration=86400000

# ── Logs ──────────────────────────────────────────────
logging.level.com.groupsapp=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG